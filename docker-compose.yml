version: '3.9'

services:

  app:
    build: .
    container_name: triple_app
    ports:
      - "8080:80"
    volumes:
      - ./uploads:/var/www/html/uploads
    environment:
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_PORT: ${MAIL_PORT:-587}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - triple_net
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: triple_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: triple_auth
    volumes:
      - db_data:/var/lib/mysql
      - ./config/create_tables.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - triple_net
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: triple_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
    depends_on:
      - db
    networks:
      - triple_net
    restart: unless-stopped

volumes:
  db_data:

networks:
  triple_net:
    driver: bridge
